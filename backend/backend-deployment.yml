apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend-container
          image: 809278132250.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-backend:a4a46bda2192f85dc974af6dca36633ea41d627f
          ports:
            - containerPort: 5000
