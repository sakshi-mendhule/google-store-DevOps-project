apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlegrocery-deployment
  labels:
    app: googlegrocery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlegrocery
  template:
    metadata:
      labels:
        app: googlegrocery
    spec:
      containers:
      - name: googlegrocery
        image: 809278132250.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlegrocery:a4a46bda2192f85dc974af6dca36633ea41d627f
        ports:
        - containerPort: 80
