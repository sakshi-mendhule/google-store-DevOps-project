apiVersion: apps/v1
kind: Deployment
metadata:
  name: main-frontend-deployment
  labels:
    app: main-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: main-frontend
  template:
    metadata:
      labels:
        app: main-frontend
    spec:
      containers:
      - name: main-frontend
        image: 809278132250.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-main:a4a46bda2192f85dc974af6dca36633ea41d627f
        ports:
        - containerPort: 80

