      labels:
        app: computers
    spec:
      containers:
      - name: computers
        image: 809278132250.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-computers:ef406477ca7d86f920befdd4b5472d15786c1c99
        ports:
        - containerPort: 80
