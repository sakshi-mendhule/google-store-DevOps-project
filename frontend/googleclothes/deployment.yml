apiVersion: apps/v1
kind: Deployment
metadata:
  name: googleclothes-deployment
  labels:
    app: googleclothes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googleclothes
  template:
    metadata:
      labels:
        app: googleclothes
    spec:
      containers:
      - name: googleclothes
        image: 809278132250.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googleclothes:ef406477ca7d86f920befdd4b5472d15786c1c99
        ports:
        - containerPort: 80
