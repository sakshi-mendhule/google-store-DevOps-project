apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 809278132250.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlepay:c953126adf6504d05b1f921b539ce2ee2ababd92
        ports:
        - containerPort: 80
