apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlepay-deployment
  labels:
    app: googlepay
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlepay
  template:
    metadata:
      labels:
        app: googlepay
    spec:
      containers:
      - name: googlepay
        image: 809278132250.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlepay:a4a46bda2192f85dc974af6dca36633ea41d627f
        ports:
        - containerPort: 80
