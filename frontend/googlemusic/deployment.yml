apiVersion: apps/v1
kind: Deployment
metadata:
  name: googlemusic-deployment
  labels:
    app: googlemusic
spec:
  replicas: 2
  selector:
    matchLabels:
      app: googlemusic
  template:
    metadata:
      labels:
        app: googlemusic
    spec:
      containers:
      - name: googlemusic
        image: 809278132250.dkr.ecr.ap-northeast-1.amazonaws.com/shopping-site-googlemusic:ef406477ca7d86f920befdd4b5472d15786c1c99
        ports:
        - containerPort: 80
